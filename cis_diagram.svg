    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#d97706"/></marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="0.4" opacity="0.5"/></pattern>
    <style>
      .title-group{animation:fadeDown 0.6s ease 0.0s both}.layer-0{animation:fadeDown 0.5s ease 0.1s both}.layer-1{animation:fadeDown 0.5s ease 0.25s both}.layer-3a{animation:fadeRight 0.5s ease 0.55s both}.layer-3b{animation:fadeLeft 0.5s ease 0.55s both}.formula-box{animation:fadeUp 0.6s ease 0.9s both}.stats-row{animation:fadeUp 0.6s ease 1.0s both}.flow-line{stroke-dasharray:6 4;animation:flowDash 1.2s linear infinite}.flow-line-slow{stroke-dasharray:5 4;animation:flowDash 2s linear infinite}.connector-pulse{stroke-dasharray:4 3;animation:flowDash 0.9s linear infinite}.live-dot{animation:livePulse 2s ease infinite}.live-badge-text{animation:badgePulse 2s ease infinite}
      @keyframes flowDash{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}@keyframes fadeLeft{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}@keyframes livePulse{0%,100%{opacity:1;r:4}50%{opacity:0.4;r:3}}@keyframes badgePulse{0%,100%{opacity:1}50%{opacity:0.6}}
    </style>
